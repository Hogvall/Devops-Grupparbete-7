name: Node.js CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint-and-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node-version: [22, 24]

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: motesappen/package-lock.json

      - name: Install dependencies
        working-directory: motesappen
        run: npm install

      - name: Install Playwright browsers
        working-directory: motesappen
        run: npx playwright install --with-deps chromium

      - name: Run lint
        working-directory: motesappen
        run: npm run lint

      - name: Run tests
        working-directory: motesappen
        run: npm run test