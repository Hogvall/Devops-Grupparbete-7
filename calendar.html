<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meeting App | Calendar</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="./src/styles/general.css" />
  <link rel="stylesheet" href="./src/styles/calendar.css" />
</head>
<body>
  <header class="site_header">
    <a href="/index.html" class="site_logo">meet<span>ing</span>app</a>
    <nav class="site_nav">
      <a href="/index.html" class="nav_link">Explore</a>
      <a href="/create-meeting.html" class="nav_link">Create Meeting</a>
      <a href="/calendar.html" class="nav_link active">Calendar</a>
    </nav>
    <a href="/profile.html" class="nav_profile_link">
      <img src="src/img/user.png" alt="Profile" class="profile_icon" />
    </a>
  </header>

  <main class="calendar_page">
    <div class="page_heading">
      <h1>Your calendar</h1>
      <p>Your upcoming meetings in one place.</p>
    </div>

    <div class="create_event_card">
      <h2>New meeting</h2>
      <div class="event_inputs">
        <input type="text" id="event-title" placeholder="Meeting name" />
        <input type="datetime-local" id="event-time" />
        <button id="create-event-btn">Create meeting</button>
      </div>
    </div>

    <div class="events_section">
      <p class="events_section_label">Your meetings</p>
      <ul id="event-list" class="event-list"></ul>
    </div>
  </main>

  <script type="module">

    import { fetchEvents, createEvent } from './src/scripts/calendar.js';

    async function loadEvents() {
      const events = await fetchEvents();
      const list = document.getElementById('event-list');
      list.innerHTML = '';
      events.forEach(ev => {
        const li = document.createElement('li');
        li.textContent = `${ev.title} - ${ev.time}`;
        list.appendChild(li);
      });
    }

    document.getElementById('create-event-btn').addEventListener('click', async () => {
      const title = document.getElementById('event-title').value;
      const time = document.getElementById('event-time').value;
      await createEvent(title, time);
      loadEvents();
    });

    loadEvents();
  </script>
</body>
</html>
