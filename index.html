<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mötesappen</title>
  <link rel="stylesheet" href="./src/styles/general.css" />
</head>

<body>
  <header class="header">
    <h1 class="logo">Mötesappen</h1>

    <div class="header-right">
      <img src="src/img/user.png" alt="Profile" class="profile-icon" />
    </div>
  </header>

  <main class="main-content">
    <section class="search-section">
      <h2>Find a meeting</h2>

      <div class="filters">
        <select id="category" class="dropdown">
          <option value="">Category</option>
          <option value="1">Tech & Networking</option>
<option value="2">Sports & Fitness</option>
<option value="3">Music & Arts</option>
<option value="4">Food & Drink</option>
<option value="5">Education</option>
<option value="6">Other</option>
<option value="7">Games</option>
<option value="8">Casual Hangout</option>
        </select>

        <select id="location" class="dropdown">
          <option value="Webhallen HQ">Webhallen HQ</option>
<option value="Padel Arena">Padel Arena</option>
<option value="The Jazz Corner">The Jazz Corner</option>
<option value="Stockholm">Stockholm</option>
        </select>

        <button class="search-btn">Search</button>
      </div>
    </section>
  </main>
  <div id="results"></div>

<script type="module" src="./src/scripts/search.js"></script>
</body>
</html>
